name: Blue-Green Deploy

on:
  workflow_dispatch:
    inputs:
      slot:
        description: 'Deploy slot'
        required: true
        default: 'blue'
        type: choice
        options:
          - blue
          - green

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.slot }} slot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/carlosrolo/cloud-cicd-pipeline:${{ github.event.inputs.slot }}
            ghcr.io/carlosrolo/cloud-cicd-pipeline:latest

      - name: Deploy slot to Render
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Accept: application/json"

      - name: Notify Telegram
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="🔵 *Blue-Green Deploy*
            
          Slot: \`${{ github.event.inputs.slot }}\`
          Imagen: \`ghcr.io/carlosrolo/cloud-cicd-pipeline:${{ github.event.inputs.slot }}\`
          Estado: ✅ Deployed"
